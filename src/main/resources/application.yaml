server:
  port: 10002

spring:
  application:
    name: config-server

  cloud:
    config:
      server:
        git:
          uri: https://github.com/3s-ticketing/config-repo
          default-label: main

management:
  metrics:
    tags:
      application: ${spring.application.name}
  endpoints:
    web:
      exposure:
        include: health,info,prometheus